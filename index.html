<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Client | Modern Minecraft Utility</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #080808;
            --text-color: #e0e0e0;
            /* Zenith-teema: Syvä purppura ja sähkönsininen */
            --accent-color: #7000ff;
            --hover-color: #8b3dff;
            --font-family: 'Poppins', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(112, 0, 255, 0.1) 0%, rgba(8, 8, 8, 0) 50%);
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .logo-icon {
            font-size: 2.5rem;
            font-weight: 700;
            color: white;
            background: linear-gradient(135deg, var(--accent-color), #00d2ff);
            width: 90px;
            height: 90px;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 30px rgba(112, 0, 255, 0.4);
            margin: 0 auto 30px;
            font-family: monospace;
        }

        h1 {
            font-size: 3.5rem;
            margin: 0 0 10px 0;
            font-weight: 700;
        }

        h1 span {
            color: var(--accent-color);
        }

        p {
            font-size: 1.2rem;
            color: #a0a0a0;
            margin-bottom: 40px;
            max-width: 600px;
            line-height: 1.6;
        }

        .btn {
            background: linear-gradient(90deg, var(--accent-color), #00d2ff);
            color: white;
            padding: 16px 40px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            display: inline-block;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(112, 0, 255, 0.6);
        }

        footer {
            padding: 20px;
            text-align: center;
            color: #555;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-icon">ZC</div>
        
        <h1>Zenith<span>Client</span></h1>
        <p>Ultra-lightweight and modular utility client for Minecraft. Built for performance and optimized for anarchy.</p>
        
        <a href="#" class="btn">View Source on GitHub</a>
    </div>

    <footer>
        <p>&copy; <span id="year"></span> Zenith Client. Open Source Project.</p>
    </footer>

    <script>
        document.getElementById("year").textContent = new Date().getFullYear();
    </script>
</body>
</html>
